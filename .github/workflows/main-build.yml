# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

name: Build Main

on:
  workflow_dispatch:
  push:
    branches:
        - main
        - '[0-9]*.[0-9]*.x'
    tags:
      - v*
    paths-ignore:
      - .github/**
      - docs/**
      - README.md
      - LICENSE

env:
  PROJECTS: ${{ github.workspace }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Set up JDK 21
      uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Determine SDK ref
      id: sdk-ref
      run: |
        BRANCH="${GITHUB_REF_NAME}"
        if git ls-remote --heads https://github.com/wanaku-ai/wanaku-capabilities-java-sdk.git "$BRANCH" | grep -q .; then
          echo "ref=$BRANCH" >> $GITHUB_OUTPUT
        else
          echo "ref=main" >> $GITHUB_OUTPUT
        fi
    - name: Checkout and build dependencies
      run: |
        cd ..
        git clone -b ${{ steps.sdk-ref.outputs.ref }} https://github.com/wanaku-ai/wanaku-capabilities-java-sdk.git
        cd wanaku-capabilities-java-sdk
        mvn -DskipTests -B install --file pom.xml
        cd ${{ github.workspace }}
    - name: Build with Maven
      run: mvn -B clean package --file pom.xml
    - name: Generate Test Reports
      if: always()
      run: mvn -B --no-transfer-progress surefire-report:report-only surefire-report:failsafe-report-only -Daggregate=true
    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: test-reports-${{ matrix.os }}
        path: 'target/reports/'
        retention-days: 14
        if-no-files-found: ignore
    - name: Set arch
      id: arch
      run: echo "arch=$(uname -m)" >> $GITHUB_OUTPUT
    - name: Login to Container Registry
      if: github.repository == 'wanaku-ai/camel-integration-capability'
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        registry: quay.io
        username: ${{ secrets.QUAY_USERNAME }}
        password: ${{ secrets.QUAY_PASSWORD }}
    - name: Build containers
      if: github.repository == 'wanaku-ai/camel-integration-capability'
      run: podman build -t quay.io/wanaku/camel-integration-capability:${{ github.ref_name }}-${{ steps.arch.outputs.arch }} .
    - name: Push containers
      if: github.repository == 'wanaku-ai/camel-integration-capability'
      run: podman push quay.io/wanaku/camel-integration-capability:${{ github.ref_name }}-${{ steps.arch.outputs.arch }}

  createManifests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Login to Container Registry
        if: github.repository == 'wanaku-ai/camel-integration-capability'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - name: Build and Push Manifests
        run: |
          chmod +x build-manifests.sh
          ./build-manifests.sh ${{ github.ref_name }}
